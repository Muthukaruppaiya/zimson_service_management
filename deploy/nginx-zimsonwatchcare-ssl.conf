# Nginx — zimsonwatchcare.com with commercial SSL (CRT + CA bundle + PFX)
# Certs on server: /etc/ssl/zimsonwatchcare/fullchain.pem + privkey.pem
# Install: sudo cp deploy/nginx-zimsonwatchcare-ssl.conf /etc/nginx/sites-available/zimsonwatchcare
#          sudo nginx -t && sudo systemctl reload nginx

upstream zimson_node {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name zimsonwatchcare.com www.zimsonwatchcare.com;

    ssl_certificate     /etc/ssl/zimsonwatchcare/fullchain.pem;
    ssl_certificate_key /etc/ssl/zimsonwatchcare/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 12M;

    location /api/ {
        proxy_pass http://zimson_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location /api/media/ {
        proxy_pass http://zimson_node;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location /uploads/ {
        proxy_pass http://zimson_node;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://zimson_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name zimsonwatchcare.com www.zimsonwatchcare.com;
    return 301 https://$host$request_uri;
}
