# Nginx — zimsonwatchcare.com on EC2 (18.61.69.104)
# Install: sudo apt install nginx
# Enable: sudo ln -sf /path/to/repo/deploy/nginx-zimsonwatchcare.conf /etc/nginx/sites-enabled/zimsonwatchcare
# Test: sudo nginx -t && sudo systemctl reload nginx
#
# SSL: after certbot, uncomment the ssl_server block and disable the :80 proxy-only block if desired.

upstream zimson_node {
    server 127.0.0.1:4000;
    keepalive 32;
}

# --- HTTP (use until SSL certificates are installed) ---
server {
    listen 80;
    listen [::]:80;
    server_name zimsonwatchcare.com www.zimsonwatchcare.com;

    client_max_body_size 12M;

    location /api/ {
        proxy_pass http://zimson_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/media/ {
        proxy_pass http://zimson_node;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /uploads/ {
        proxy_pass http://zimson_node;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://zimson_node;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

